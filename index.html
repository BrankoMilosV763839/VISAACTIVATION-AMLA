<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visa Portal | Secure Login & Activation</title>
    <style>
        /* CSS STYLES */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .visa-logo { font-size: 32px; font-weight: bold; color: #1a1f71; font-style: italic; margin-bottom: 10px; }
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a1f71; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #272c8a; }
        fieldset { border: 1px solid #ddd; border-radius: 5px; margin-bottom: 15px; text-align: left; padding: 15px; }
        legend { font-weight: bold; font-size: 14px; color: #1a1f71; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #333; }

        /* Loading Animation */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #1a1f71; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. LOADING OVERLAY -->
    <div id="loader" class="overlay hidden">
        <div class="spinner"></div>
        <p id="loader-text">Verifying AMLA Credentials...</p>
    </div>

    <!-- 2. LOGIN SECTION -->
    <div id="login-section" class="container">
        <div class="visa-logo">VISA</div>
        <h2>Secure Login</h2>
        <p>Sign in to your account</p>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" id="pass" placeholder="Password" required>
            <input type="text" id="code" placeholder="6-Digit Access Code" maxlength="6" required>
            <button type="submit">Login</button>
        </form>
        <p id="error-msg" class="hidden" style="color: red; font-size: 14px; margin-top: 10px;">Invalid credentials. Try again.</p>
    </div>

    <!-- 3. ACTIVATION SECTION -->
    <div id="activation-section" class="container hidden">
        <div class="visa-logo">VISA</div>
        <h2>Card Activation</h2>
        <p>Welcome, <strong>brankomilos</strong>.</p>
        <form id="activationForm">
            <fieldset>
                <legend>Visa Card Details</legend>
                <label>16-Digit Card Number:</label>
                <input type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="16" required>
                <div style="display: flex; gap: 10px;">
                    <input type="text" placeholder="MM/YY" style="flex:1" required>
                    <input type="password" placeholder="CVV" style="flex:1" required>
                </div>
            </fieldset>
            <fieldset>
                <legend>AMLA Security</legend>
                <label>Confirm Registered ID Number:</label>
                <input type="text" placeholder="ID Number" required>
            </fieldset>
            <button type="submit">Activate Now</button>
        </form>
    </div>

    <script>
        /* JAVASCRIPT LOGIC */
        const loginForm = document.getElementById('loginForm');
        const activationForm = document.getElementById('activationForm');
        const loader = document.getElementById('loader');
        const loginSection = document.getElementById('login-section');
        const activationSection = document.getElementById('activation-section');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Your required credentials
            const validUser = "brankomilos";
            const validPass = "160897";
            const validCode = "001997";

            const userIn = document.getElementById('user').value;
            const passIn = document.getElementById('pass').value;
            const codeIn = document.getElementById('code').value;

            if (userIn === validUser && passIn === validPass && codeIn === validCode) {
                errorMsg.classList.add('hidden');
                loader.classList.remove('hidden');

                // Loading for 3 seconds
                setTimeout(() => {
                    loader.classList.add('hidden');
                    loginSection.classList.add('hidden');
                    activationSection.classList.remove('hidden');
                }, 3000);
            } else {
                errorMsg.classList.remove('hidden');
            }
        });

        activationForm.addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('loader-text').innerText = "Processing Activation...";
            loader.classList.remove('hidden');
            
            setTimeout(() => {
                alert("Card Successfully Activated!");
                loader.classList.add('hidden');
            }, 2500);
        });
    </script>

</body>
</html>
